            --line-color: #e04370;    /* 時間軸線條 */

            --timeline-icon-size: 38px;
            --timeline-icon-font-size: 16px;
            --title-font-size: 20px;
            --note-font-size: 17px;
            --meta-font-size: 14px;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .serif-font {
            font-family: 'Shippori Mincho', serif;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .timeline-line {
            position: absolute;
            left: calc(var(--timeline-icon-size) / 2);
            top: 40px;
            bottom: -20px;
            width: 3px;
            background-color: var(--line-color);
            z-index: 0;
            transform: translateX(-50%);
            opacity: 0.2;
        }
        .last-item .timeline-line { display: none; }

        .tab-active {
            background-color: white;
            color: var(--primary-color);
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tab-inactive {
            background-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .nav-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0,0,0,0.05);
            color: var(--text-main);
            transition: all 0.2s;
        }
        .nav-btn:active { transform: scale(0.95); }

        const tabContainer = document.getElementById('tab-container');
        const itineraryContainer = document.getElementById('itinerary-container');
        const heroTitle = document.getElementById('hero-title');
        const heroDesc = document.getElementById('hero-desc');

        const headerDate = document.getElementById('header-date');

        // 天氣 API
        async function fetchRealWeather(locationName, elementId) {
            let coords = locationCoords["default"];
            for (const key in locationCoords) {
                if (locationName.includes(key)) { coords = locationCoords[key]; break; }
            }
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current=temperature_2m,weather_code,is_day&timezone=Asia%2FTokyo`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.current) {
                    const info = getWeatherIcon(data.current.weather_code, data.current.is_day);
                    const el = document.getElementById(elementId);
                    if (el) el.innerHTML = `<i class="fa-solid ${info.icon} ${info.color}"></i> ${Math.round(data.current.temperature_2m)}°C`;
                }
            } catch (error) { console.error("Weather error", error); }
        }

        function getWeatherIcon(code, isDay) {
            if (code === 0) return { icon: isDay ? "fa-sun" : "fa-moon", color: "text-orange-400" };
            if (code <= 3) return { icon: "fa-cloud", color: "text-gray-400" };
            if (code >= 51 && code <= 67) return { icon: "fa-umbrella", color: "text-blue-400" };
            return { icon: "fa-cloud", color: "text-gray-400" };
        }

        function renderTabs() {
            tabContainer.innerHTML = '';
            itineraryData.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-300 ${index === 0 ? 'tab-active' : 'tab-inactive'}`;
                btn.innerText = item.day;
                btn.onclick = () => switchTab(index);
                tabContainer.appendChild(btn);
            });
        }

        function switchTab(index) {
            const tabs = tabContainer.children;
            for (let i = 0; i < tabs.length; i++) {
                if (i === index) { tabs[i].classList.add('tab-active'); tabs[i].classList.remove('tab-inactive'); }
                else { tabs[i].classList.add('tab-inactive'); tabs[i].classList.remove('tab-active'); }
            }
            renderItinerary(index);
            updateHero(index);
            itineraryContainer.scrollTop = 0;
        }

        function renderItinerary(index) {
            const dayData = itineraryData[index];
            headerDate.innerText = dayData.date === "重要資訊" ? "INFO" : dayData.date;
            
            let html = `
                <div class="mb-6 fade-in">
                    <h2 class="text-2xl font-bold serif-font" style="color: var(--text-main);">${dayData.title}</h2>
                    <p class="text-sm mt-1" style="color: var(--text-sub);">${dayData.summary}</p>
                    <div class="md:hidden mt-4 p-4 rounded-xl text-sm border border-[var(--primary-color)] shadow-sm" style="background-color: var(--accent-color); color: var(--text-main);">
                        <p class="font-bold mb-1"><i class="fa-solid fa-circle-info mr-1"></i> 導遊筆記</p>
                        ${dayData.guideNotes}
                    </div>
                </div>
            `;

            if (dayData.activities) {
                html += '<div class="relative space-y-6 pl-2">';
                dayData.activities.forEach((activity, idx) => {
                    const isLast = idx === dayData.activities.length - 1;
                    const weatherId = `weather-${index}-${idx}`;
                    let mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(activity.location)}`;
                    
                    // 生成多段內容 (Text + Image)
                    let activityContentHtml = '';
                    if (activity.content && Array.isArray(activity.content)) {
                        activity.content.forEach(segment => {
                            activityContentHtml += `
                                <div class="mb-4 last:mb-0">
                                    <div class="mb-3 leading-relaxed p-3 border-l-2 rounded-r-lg" style="font-size: var(--note-font-size); line-height: 1.6; border-color: var(--primary-color); background-color: rgba(224, 67, 112, 0.05); color: var(--text-sub);">
                                        ${segment.text}
                                    </div>
                                    ${segment.image ? `
                                    <div class="mb-3 overflow-hidden rounded-lg shadow-sm border border-gray-100">
                                        <img src="${segment.image}" class="w-full h-auto object-cover max-h-64" alt="行程圖片" onerror="this.style.display='none'">
                                    </div>
                                    ` : ''}
                                </div>
                            `;
                        });
                    }

                    html += `
                        <div class="relative flex gap-4 fade-in ${isLast ? 'last-item' : ''}" style="animation-delay: ${idx * 0.1}s">
                            <div class="flex flex-col items-center">
                                <div class="rounded-full border-2 border-white flex items-center justify-center shadow-sm z-10 shrink-0"
                                     style="width: var(--timeline-icon-size); height: var(--timeline-icon-size); font-size: var(--timeline-icon-font-size); background-color: var(--light-blue); color: white;">
                                    <i class="fa-solid ${activity.icon}"></i>
                                </div>
                                <div class="timeline-line"></div>
                            </div>

                            <div class="flex-1 bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow relative overflow-hidden group">
                                <div id="${weatherId}" class="absolute top-4 right-4 text-xs font-medium flex items-center gap-1 bg-gray-50 px-2 py-1 rounded-md text-gray-400">
                                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                                </div>

                                <div class="font-bold mb-1 uppercase" style="font-size: var(--meta-font-size); color: var(--primary-color); opacity: 0.9;">${activity.time}</div>
                                <h3 class="font-bold mb-1" style="font-size: var(--title-font-size); color: var(--text-main);">${activity.title}</h3>
                                <p class="flex items-center gap-1 mb-3" style="font-size: var(--meta-font-size); color: var(--text-sub);">
                                    <i class="fa-solid fa-location-dot opacity-50 text-xs"></i> ${activity.location}
                                </p>
                                
                                ${activityContentHtml}

                                <div class="flex flex-wrap gap-2 mt-auto">
                                    <a href="${mapUrl}" target="_blank" class="nav-btn px-4 py-2 rounded-lg text-center font-bold flex items-center justify-center gap-2 hover:bg-gray-50 flex-grow" style="font-size: var(--meta-font-size);">
                                        <i class="fa-solid fa-location-arrow" style="color: var(--primary-color);"></i> 導航
                                    </a>
                                    
                                    ${activity.links ? activity.links.map(link => `
                                        ${(link.url && link.url !== '#') ? `
                                        <a href="${link.url}" target="_blank" class="nav-btn px-3 py-2 rounded-lg text-center flex items-center justify-center gap-1 hover:bg-gray-50" title="${link.title}">
                                            <i class="fa-solid fa-link" style="color: var(--primary-color);"></i>
                                            <span class="text-xs font-medium">${link.title}</span>
                                        </a>` : ''}
                                    `).join('') : ''}
                                </div>
                            </div>
                        </div>
                    `;
                    setTimeout(() => fetchRealWeather(activity.location, weatherId), idx * 150);
                });
                html += '</div>';
            }
            itineraryContainer.innerHTML = html;
        }

        function updateHero(index) {
            const data = itineraryData[index];
            heroTitle.innerText = data.title;
            heroDesc.innerText = data.summary;
            guideNotes.innerHTML = data.guideNotes;
        }

        window.onload = () => { renderTabs(); switchTab(0); };
    </script>
</body>
</html>
